<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入所前面接・アセスメントシート｜おおやけの里</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f3;color:#2c2c2a;font-size:14px;line-height:1.6;}
.page{max-width:880px;margin:0 auto;padding:1.25rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.header-title{font-size:18px;font-weight:600;}
.header-sub{font-size:12px;color:#888780;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;border:none;}
.btn-primary{background:#185FA5;color:#fff;}
.btn-primary:hover{background:#0C447C;}
.btn-secondary{background:#fff;color:#5F5E5A;border:0.5px solid rgba(0,0,0,0.2);}
.btn-secondary:hover{background:#f5f5f3;}
.btn-warn{background:#FAEEDA;color:#8A6D2F;border:0.5px solid #E8D9BE;}
.btn-warn:hover{background:#F5E4C8;}
.warn-banner{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:10px;padding:12px 16px;margin-bottom:1rem;display:none;}
.warn-banner.show{display:block;}
.warn-banner-title{font-size:13px;font-weight:600;color:#A32D2D;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.warn-list{font-size:12px;color:#A32D2D;margin-left:1.2rem;}
.section{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;margin-bottom:1rem;overflow:hidden;}
.section-head{background:#E6F1FB;padding:10px 16px;font-size:14px;font-weight:600;color:#0C447C;display:flex;align-items:center;gap:8px;cursor:pointer;justify-content:space-between;}
.section-head-left{display:flex;align-items:center;gap:8px;}
.section-icon{font-size:18px;}
.section-body{padding:16px;}
.section-body.collapsed{display:none;}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field-label{font-size:13px;font-weight:500;color:#2c2c2a;margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.req{color:#E24B4A;font-size:11px;}
.field-control{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;color:#2c2c2a;}
textarea.field-control{min-height:60px;resize:vertical;line-height:1.6;}
.field-control:focus{outline:none;border-color:#185FA5;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.chk-confirm{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#888780;cursor:pointer;margin-left:auto;user-select:none;}
.chk-confirm input{cursor:pointer;}
.chk-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chk-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;user-select:none;}
.chk-pill input{cursor:pointer;}
.chk-pill.checked{background:#E6F1FB;border-color:#185FA5;color:#0C447C;}
.hint{font-size:11px;color:#888780;margin-top:3px;}
.meta-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:16px;margin-bottom:1rem;}
.progress-line{height:6px;background:#f1efe8;border-radius:3px;overflow:hidden;margin-top:8px;}
.progress-fill{height:6px;background:#3B6D11;border-radius:3px;transition:width 0.3s;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#2c2c2a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;}
/* 画面表示時は印刷ビューを隠す */
#print-view{display:none;}
@media print{
  /* 入力画面を完全に隠し、印刷ビューだけ表示 */
  body>.page{display:none!important;}
  #print-view{display:block!important;}
  body{background:#fff;margin:0;}
  @page{margin:8mm 8mm;}
}
/* 印刷ビューのスタイル（画面でもプレビュー可能） */
#print-view{font-size:10px;color:#000;line-height:1.3;}
#print-view .pv-head{text-align:center;border-bottom:1.5px solid #000;padding-bottom:3px;margin-bottom:5px;}
#print-view .pv-title{font-size:14px;font-weight:700;}
#print-view .pv-meta{font-size:9.5px;margin-top:2px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
#print-view .pv-sec{margin-bottom:3px;break-inside:avoid;}
#print-view .pv-sec-title{font-size:11px;font-weight:700;background:#e8e8e8;padding:1px 6px;border-left:3px solid #555;margin-bottom:1px;}
#print-view .pv-field{display:flex;gap:6px;padding:1px 3px;border-bottom:0.5px dotted #ccc;break-inside:avoid;}
#print-view .pv-label{flex:0 0 100px;font-weight:600;color:#333;}
#print-view .pv-value{flex:1;white-space:pre-wrap;word-break:break-word;}
#print-view .pv-empty{color:#bbb;}
#print-view .pv-cols{column-count:2;column-gap:14px;}
#print-view .pv-cols .pv-field{break-inside:avoid;}
/* 短い選択肢項目は3列まで詰める（活動ADLなど） */
#print-view .pv-cols3{column-count:3;column-gap:12px;}
#print-view .pv-cols3 .pv-field{break-inside:avoid;}
#print-view .pv-cols3 .pv-label{flex:0 0 58px;}
</style>
</head>
<body>
<div class="page">

<div class="header">
  <div>
    <div class="header-title"><i class="ti ti-clipboard-text" style="vertical-align:-2px;margin-right:6px;"></i>入所前面接・アセスメントシート</div>
    <div class="header-sub">おおやけの里　／　ICFに基づく標準様式</div>
  </div>
  <span class="header-sub" id="today-date"></span>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="checkComplete()"><i class="ti ti-checks"></i>入力チェック</button>
  <button class="btn btn-secondary" onclick="printSheet()"><i class="ti ti-printer"></i>印刷・PDF保存</button>
  <button class="btn btn-secondary" onclick="saveLocal()"><i class="ti ti-device-floppy"></i>一時保存</button>
  <button class="btn btn-secondary" onclick="exportText()"><i class="ti ti-file-text"></i>テキスト出力</button>
  <button class="btn btn-warn" onclick="clearAll()"><i class="ti ti-eraser"></i>新規（クリア）</button>
</div>

<div class="warn-banner" id="warn-banner">
  <div class="warn-banner-title"><i class="ti ti-alert-triangle"></i>未確認の項目があります</div>
  <ul class="warn-list" id="warn-list"></ul>
</div>

<div class="meta-card">
  <div class="row3">
    <div class="field" style="margin-bottom:0;">
      <div class="field-label">受付番号・整理番号</div>
      <input class="field-control" data-key="recno" placeholder="例：2026-001">
    </div>
    <div class="field" style="margin-bottom:0;">
      <div class="field-label">面接日</div>
      <input class="field-control" type="date" data-key="date">
    </div>
    <div class="field" style="margin-bottom:0;">
      <div class="field-label">面接者</div>
      <input class="field-control" data-key="interviewer" placeholder="例：相談員 ○○">
    </div>
  </div>
  <div class="row2" style="margin-top:10px;">
    <div class="field" style="margin-bottom:0;">
      <div class="field-label">面接場所</div>
      <select class="field-control" data-key="place">
        <option value="">選択</option>
        <option>来所</option><option>病院（入院先）</option><option>自宅</option><option>その他</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:0;">
      <div class="field-label">同席者</div>
      <input class="field-control" data-key="attendant" placeholder="例：看護師・リハ職・家族">
    </div>
  </div>
  <div style="font-size:12px;color:#888780;margin-top:10px;">
    入力の進み具合：<span id="progress-text">0%</span>
    <div class="progress-line"><div class="progress-fill" id="progress-fill" style="width:0%;"></div></div>
  </div>
</div>

<div id="sections"></div>

</div>
<div class="toast" id="toast"></div>
<div id="print-view"></div>

<script>
// ===== 項目定義 =====
// type: text / textarea / select / pills / date
// confirm:true を付けた項目は「確認」チェックを持ち、未チェックだと警告対象
const SECTIONS = [
  {
    id:'direction', icon:'ti-compass', title:'方向性',
    fields:[
      {key:'goal_direction', label:'入所の方向性', type:'pills', confirm:true,
        options:['在宅復帰','長期療養','一時的入所（レスパイト）','看取りも視野','未定']},
      {key:'direction_note', label:'方向性の補足（経緯・条件など）', type:'textarea'},
      {key:'expected_period', label:'想定される入所期間', type:'text', placeholder:'例：3か月をめどに在宅復帰を検討'}
    ]
  },
  {
    id:'intention', icon:'ti-message-heart', title:'本人・家族の意向',
    fields:[
      {key:'honnin_iko', label:'本人の意向', type:'textarea', confirm:true, placeholder:'本人が語った言葉をそのまま記録'},
      {key:'kazoku_iko', label:'家族の意向', type:'textarea', confirm:true, placeholder:'家族の希望・不安・期待'},
      {key:'iko_gap', label:'本人と家族の意向の相違', type:'textarea', placeholder:'相違があれば記録。なければ「なし」'}
    ]
  },
  {
    id:'medical', icon:'ti-stethoscope', title:'医療的な情報',
    fields:[
      {key:'genbyo', label:'現病歴', type:'textarea', confirm:true},
      {key:'kibyo', label:'既往歴', type:'textarea', confirm:true},
      {key:'medication', label:'服薬状況', type:'textarea', confirm:true, placeholder:'薬剤名・管理方法（自己/管理）など'},
      {key:'medical_care', label:'医療処置', type:'pills',
        options:['なし','点滴','吸引','経管栄養','インスリン','在宅酸素','尿道カテーテル','ストマ','褥瘡処置','透析']},
      {key:'medical_care_note', label:'医療処置の補足', type:'text'},
      {key:'infection', label:'感染症', type:'pills',
        options:['なし','MRSA','疥癬','肝炎','結核（既往）','その他']},
      {key:'shuchii', label:'主治医・医療機関', type:'text', placeholder:'医療機関名・主治医名'},
      {key:'allergy', label:'アレルギー・禁忌', type:'text', placeholder:'食物・薬剤など。なければ「なし」'}
    ]
  },
  {
    id:'mind_body', icon:'ti-brain', title:'心身機能・身体構造',
    fields:[
      {key:'paralysis', label:'麻痺・拘縮', type:'textarea', placeholder:'部位・程度'},
      {key:'cognition', label:'認知機能', type:'textarea', confirm:true, placeholder:'見当識・記憶・判断力。HDS-R等あれば点数も'},
      {key:'bpsd', label:'認知症の行動・心理症状（BPSD）', type:'pills',
        options:['なし','徘徊','興奮・暴言','介護拒否','昼夜逆転','幻覚・妄想','帰宅願望','不潔行為']},
      {key:'communication', label:'意思疎通・視聴覚', type:'textarea', placeholder:'会話・難聴・視力・失語など'},
      {key:'pain', label:'痛み・その他症状', type:'text'}
    ]
  },
  {
    id:'adl', icon:'ti-walk', title:'活動（ADL）',
    note:'自宅生活時の状態を基準に記録します',
    fields:[
      {key:'adl_eat', label:'食事', type:'pills', confirm:true, options:['自立','見守り','一部介助','全介助']},
      {key:'adl_eat_note', label:'食事の補足（形態・嚥下など）', type:'text', placeholder:'例：きざみ食・とろみ付き'},
      {key:'adl_toilet', label:'排泄', type:'pills', confirm:true, options:['自立','見守り','一部介助','全介助']},
      {key:'adl_toilet_note', label:'排泄の補足（おむつ・尿器など）', type:'text'},
      {key:'adl_bath', label:'入浴', type:'pills', confirm:true, options:['自立','見守り','一部介助','全介助']},
      {key:'adl_move', label:'移動', type:'pills', confirm:true, options:['自立','杖','歩行器','車いす','全介助']},
      {key:'adl_transfer', label:'移乗', type:'pills', options:['自立','見守り','一部介助','全介助']},
      {key:'adl_dress', label:'更衣', type:'pills', options:['自立','見守り','一部介助','全介助']},
      {key:'adl_groom', label:'整容', type:'pills', options:['自立','見守り','一部介助','全介助']},
      {key:'adl_note', label:'ADL全体の補足', type:'textarea'}
    ]
  },
  {
    id:'participation', icon:'ti-users-group', title:'参加',
    fields:[
      {key:'hobby', label:'趣味・楽しみ', type:'textarea', placeholder:'これまで続けてきたこと・好きなこと'},
      {key:'role', label:'家庭・社会での役割', type:'text', placeholder:'例：家事・地域活動・仕事'},
      {key:'social', label:'人との交流', type:'textarea', placeholder:'友人・近所・サークルなど'}
    ]
  },
  {
    id:'environment', icon:'ti-home', title:'環境因子',
    fields:[
      {key:'family', label:'家族構成・キーパーソン', type:'textarea', confirm:true, placeholder:'同居家族・主介護者・連絡先となる人'},
      {key:'house', label:'住環境', type:'textarea', placeholder:'戸建/集合・段差・手すり・トイレ等'},
      {key:'caregiver', label:'自宅での介護者・介護力', type:'textarea', placeholder:'誰がどの程度介護できるか'},
      {key:'service', label:'利用中の介護サービス', type:'textarea', placeholder:'デイ・訪問・福祉用具など'},
      {key:'care_level', label:'要介護度', type:'pills',
        options:['要支援1','要支援2','要介護1','要介護2','要介護3','要介護4','要介護5','申請中']},
      {key:'economic', label:'経済状況・負担段階', type:'text', placeholder:'負担限度額認定の有無など'}
    ]
  },
  {
    id:'personal', icon:'ti-user', title:'個人因子',
    fields:[
      {key:'life_history', label:'生活歴', type:'textarea', placeholder:'出身・職業歴・家族歴など人物理解に資する情報'},
      {key:'character', label:'性格・価値観', type:'textarea', placeholder:'本人らしさ・大切にしていること'},
      {key:'daily_rhythm', label:'生活リズム・習慣', type:'text', placeholder:'起床就寝・食事時間・こだわり'}
    ]
  },
  {
    id:'goal', icon:'ti-target', title:'入所中の目標',
    fields:[
      {key:'goal_main', label:'入所中の目標', type:'textarea', confirm:true, placeholder:'本人・家族と共有できる具体的な目標'},
      {key:'goal_rehab', label:'リハビリ・自立支援の方針', type:'textarea'},
      {key:'goal_issue', label:'当面の課題・留意点', type:'textarea', placeholder:'受け入れにあたり特に注意すべき点'}
    ]
  }
];

const STORAGE_KEY = 'ooyake_assessment_v1';
let data = {};
let confirms = {};

const now=new Date();
const days=['日','月','火','水','木','金','土'];
document.getElementById('today-date').textContent = now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日（'+days[now.getDay()]+'）';

// ===== セクション描画 =====
function buildSections(){
  const wrap=document.getElementById('sections');
  wrap.innerHTML = SECTIONS.map(sec=>{
    const fields = sec.fields.map(f=>renderField(sec.id,f)).join('');
    const noteHtml = sec.note ? `<div class="hint" style="margin-bottom:10px;"><i class="ti ti-info-circle"></i> ${sec.note}</div>` : '';
    return `<div class="section">
      <div class="section-head" onclick="toggleSection('${sec.id}')">
        <div class="section-head-left"><i class="ti ${sec.icon} section-icon"></i>${sec.title}</div>
        <i class="ti ti-chevron-up" id="chev-${sec.id}"></i>
      </div>
      <div class="section-body" id="body-${sec.id}">
        ${noteHtml}${fields}
      </div>
    </div>`;
  }).join('');
  attachEvents();
}

function renderField(secId,f){
  const confirmChk = f.confirm ? `<label class="chk-confirm"><input type="checkbox" data-confirm="${f.key}"> 確認済</label>` : '';
  const reqMark = f.confirm ? '<span class="req">要確認</span>' : '';
  let control='';
  if(f.type==='textarea'){
    control=`<textarea class="field-control" data-key="${f.key}" placeholder="${f.placeholder||''}"></textarea>`;
  } else if(f.type==='select'){
    control=`<select class="field-control" data-key="${f.key}"><option value="">選択</option>${f.options.map(o=>`<option>${o}</option>`).join('')}</select>`;
  } else if(f.type==='pills'){
    control=`<div class="chk-row" data-pillgroup="${f.key}">${f.options.map(o=>
      `<label class="chk-pill"><input type="checkbox" data-pill="${f.key}" value="${o}">${o}</label>`).join('')}</div>`;
  } else {
    control=`<input class="field-control" data-key="${f.key}" placeholder="${f.placeholder||''}">`;
  }
  return `<div class="field">
    <div class="field-label">${f.label} ${reqMark} ${confirmChk}</div>
    ${control}
  </div>`;
}

function attachEvents(){
  document.querySelectorAll('[data-key]').forEach(el=>{
    el.addEventListener('input',()=>{ data[el.dataset.key]=el.value; updateProgress(); });
    el.addEventListener('change',()=>{ data[el.dataset.key]=el.value; updateProgress(); });
  });
  document.querySelectorAll('[data-pill]').forEach(el=>{
    el.addEventListener('change',()=>{
      const group=el.dataset.pill;
      const checked=[...document.querySelectorAll(`[data-pill="${group}"]`)].filter(x=>x.checked).map(x=>x.value);
      data[group]=checked.join('、');
      el.closest('.chk-pill').classList.toggle('checked',el.checked);
      updateProgress();
    });
  });
  document.querySelectorAll('[data-confirm]').forEach(el=>{
    el.addEventListener('change',()=>{ confirms[el.dataset.confirm]=el.checked; updateProgress(); });
  });
}

function toggleSection(id){
  document.getElementById('body-'+id).classList.toggle('collapsed');
  const chev=document.getElementById('chev-'+id);
  chev.className = chev.className.includes('up') ? 'ti ti-chevron-down' : 'ti ti-chevron-up';
}

// ===== 進捗 =====
function updateProgress(){
  const confirmFields = SECTIONS.flatMap(s=>s.fields).filter(f=>f.confirm);
  const total = confirmFields.length;
  let done=0;
  confirmFields.forEach(f=>{
    const filled = data[f.key] && String(data[f.key]).trim()!=='';
    if(filled && confirms[f.key]) done++;
  });
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('progress-text').textContent = pct+'%（要確認 '+done+'/'+total+'）';
  document.getElementById('progress-fill').style.width = pct+'%';
  saveLocal(true);
}

// ===== 入力チェック =====
function checkComplete(){
  const confirmFields = SECTIONS.flatMap(s=>s.fields.map(f=>({sec:s.title,...f}))).filter(f=>f.confirm);
  const missing=[];
  confirmFields.forEach(f=>{
    const filled = data[f.key] && String(data[f.key]).trim()!=='';
    if(!filled || !confirms[f.key]){
      let reason = !filled ? '未入力' : '確認チェックなし';
      missing.push(`【${f.sec}】${f.label}（${reason}）`);
    }
  });
  const banner=document.getElementById('warn-banner');
  if(missing.length===0){
    banner.classList.remove('show');
    toast('すべての要確認項目が入力・確認済みです');
  } else {
    document.getElementById('warn-list').innerHTML = missing.map(m=>`<li>${m}</li>`).join('');
    banner.classList.add('show');
    banner.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

// ===== 保存・復元 =====
function saveLocal(silent){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({data,confirms}));
    if(!silent) toast('一時保存しました');
  }catch(e){ if(!silent) toast('保存に失敗しました'); }
}
function loadLocal(){
  try{
    const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    data=saved.data||{}; confirms=saved.confirms||{};
  }catch(e){ data={}; confirms={}; }
  // 画面に反映
  Object.keys(data).forEach(k=>{
    const el=document.querySelector(`[data-key="${k}"]`);
    if(el){ el.value=data[k]; }
    // pills復元
    const vals=String(data[k]||'').split('、');
    document.querySelectorAll(`[data-pill="${k}"]`).forEach(p=>{
      if(vals.includes(p.value)){ p.checked=true; p.closest('.chk-pill').classList.add('checked'); }
    });
  });
  Object.keys(confirms).forEach(k=>{
    const el=document.querySelector(`[data-confirm="${k}"]`);
    if(el) el.checked=confirms[k];
  });
  updateProgress();
}

function clearAll(){
  if(!confirm('入力内容をすべて消去して新しい面接記録を始めますか？')) return;
  data={}; confirms={};
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[data-key]').forEach(el=>el.value='');
  document.querySelectorAll('[data-pill]').forEach(el=>{el.checked=false;el.closest('.chk-pill').classList.remove('checked');});
  document.querySelectorAll('[data-confirm]').forEach(el=>el.checked=false);
  document.getElementById('warn-banner').classList.remove('show');
  updateProgress();
  toast('クリアしました');
}

// ===== 印刷ビュー生成 =====
// どのフィールドを「長文（全幅）」扱いにするか（pills/textareaは長文寄り）
function isLongField(f){
  return f.type==='textarea';
}
function printSheet(){
  const pv=document.getElementById('print-view');
  // ヘッダー（メタ情報）
  const recno=data.recno||'';
  const date=data.date||'';
  const interviewer=data.interviewer||'';
  const place=data.place||'';
  const attendant=data.attendant||'';
  let html='<div class="pv-head">'
    +'<div class="pv-title">入所前面接・アセスメントシート</div>'
    +'<div class="pv-meta">'
    +'<span>受付番号：'+(recno||'—')+'</span>'
    +'<span>面接日：'+(date||'—')+'</span>'
    +'<span>面接者：'+(interviewer||'—')+'</span>'
    +'<span>場所：'+(place||'—')+'</span>'
    +'<span>同席：'+(attendant||'—')+'</span>'
    +'</div></div>';

  SECTIONS.forEach(sec=>{
    // 記入のある項目だけ集める
    const filled=sec.fields.filter(f=>{
      const v=data[f.key];
      return v && String(v).trim()!=='';
    });
    if(filled.length===0) return; // 空セクションは印刷しない
    html+='<div class="pv-sec"><div class="pv-sec-title">'+sec.title+'</div>';
    // 値の長さで3分類：長文（全幅）／短い選択肢（3列）／中くらい（2列）
    const longs=[], mids=[], shorts=[];
    filled.forEach(f=>{
      const v=String(data[f.key]);
      if(f.type==='textarea' || v.length>40) longs.push(f);
      else if(v.length<=12) shorts.push(f);
      else mids.push(f);
    });
    // 短い選択肢：3列
    if(shorts.length){
      html+='<div class="pv-cols3">';
      shorts.forEach(f=>{ html+='<div class="pv-field"><div class="pv-label">'+f.label+'</div><div class="pv-value">'+esc(data[f.key])+'</div></div>'; });
      html+='</div>';
    }
    // 中くらい：2列
    if(mids.length){
      html+='<div class="pv-cols">';
      mids.forEach(f=>{ html+='<div class="pv-field"><div class="pv-label">'+f.label+'</div><div class="pv-value">'+esc(data[f.key])+'</div></div>'; });
      html+='</div>';
    }
    // 長文：全幅
    longs.forEach(f=>{
      html+='<div class="pv-field"><div class="pv-label">'+f.label+'</div><div class="pv-value">'+esc(data[f.key])+'</div></div>';
    });
    html+='</div>';
  });

  pv.innerHTML=html;
  window.print();
}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ===== テキスト出力 =====
function exportText(){
  let out='【入所前面接・アセスメントシート】\n';
  out+='受付番号: '+(data.recno||'')+'\n';
  out+='面接日: '+(data.date||'')+'　面接者: '+(data.interviewer||'')+'\n';
  out+='面接場所: '+(data.place||'')+'　同席者: '+(data.attendant||'')+'\n';
  SECTIONS.forEach(sec=>{
    out+='\n■ '+sec.title+'\n';
    sec.fields.forEach(f=>{
      const v=data[f.key]||'';
      if(String(v).trim()!=='') out+='・'+f.label+'：'+v+'\n';
    });
  });
  const blob=new Blob([out],{type:'text/plain;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='面接アセス_'+(data.recno||'記録')+'_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.txt';
  a.click();
  toast('テキスト出力しました');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ===== 初期化 =====
buildSections();
loadLocal();
if(!data.date){ document.querySelector('[data-key="date"]').value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'); data.date=document.querySelector('[data-key="date"]').value; }
