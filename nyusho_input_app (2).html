<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入所管理　入力アプリ｜おおやけの里</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f3;color:#2c2c2a;font-size:14px;line-height:1.6;}
.page{max-width:680px;margin:0 auto;padding:1.25rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.header-title{font-size:18px;font-weight:600;}
.header-sub{font-size:12px;color:#888780;}
.status{font-size:12px;color:#888780;display:flex;align-items:center;gap:5px;}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:none;font-family:inherit;}
.btn-primary{background:#185FA5;color:#fff;}
.btn-primary:hover{background:#0C447C;}
.btn-secondary{background:#fff;color:#5F5E5A;border:0.5px solid rgba(0,0,0,0.2);}
.btn-secondary:hover{background:#f5f5f3;}
.btn-danger{background:#fff;color:#A32D2D;border:0.5px solid rgba(163,45,45,0.3);}
.btn-danger:hover{background:#FCEBEB;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:14px;font-weight:600;color:#0C447C;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:#888780;margin-bottom:4px;display:block;}
.req{color:#E24B4A;font-size:11px;}
.form-control{width:100%;padding:9px 11px;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;color:#2c2c2a;}
.form-control:focus{outline:none;border-color:#185FA5;}
.form-control[readonly]{background:#f5f5f3;color:#888780;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.section-label{font-size:12px;font-weight:600;color:#5F5E5A;margin:6px 0 8px;padding-top:10px;border-top:0.5px solid rgba(0,0,0,0.08);}
.step-preview{display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;}
.b-gray{background:#f1efe8;color:#5F5E5A;}.b-danger{background:#FCEBEB;color:#A32D2D;}
.b-warn{background:#FAEEDA;color:#BA7517;}.b-info{background:#E6F1FB;color:#185FA5;}.b-success{background:#EAF3DE;color:#3B6D11;}
.footer-btns{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.list-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden;}
.list-head{padding:12px 16px;background:#f5f5f3;font-size:13px;font-weight:600;color:#5F5E5A;display:flex;justify-content:space-between;align-items:center;}
.list-item{padding:11px 16px;border-bottom:0.5px solid rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;}
.list-item:last-child{border-bottom:none;}
.list-item:hover{background:#E6F1FB;}
.li-main{font-size:13px;}
.li-sub{font-size:11px;color:#888780;margin-top:2px;}
.li-recno{font-weight:600;color:#185FA5;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#2c2c2a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;}
.search-box{margin-bottom:10px;}
</style>
</head>
<body>
<div class="page">

<div class="header">
  <div>
    <div class="header-title"><i class="ti ti-edit" style="vertical-align:-2px;margin-right:6px;"></i>入所管理　入力アプリ</div>
    <div class="header-sub">おおやけの里　／　ケースの登録・編集</div>
  </div>
  <span class="status" id="status"><i class="ti ti-cloud"></i><span id="status-text">—</span></span>
</div>

<!-- 入力フォーム -->
<div class="card">
  <div class="card-title"><i class="ti ti-clipboard-plus"></i><span id="form-title">新規ケース登録</span></div>

  <div class="row2">
    <div class="form-group">
      <label class="form-label">受付番号</label>
      <input class="form-control" id="f-recno" readonly placeholder="登録時に自動採番">
    </div>
    <div class="form-group">
      <label class="form-label">氏名（苗字＋名前の頭文字） <span class="req">*</span></label>
      <input class="form-control" id="f-name" placeholder="例：山田.T">
      <div style="font-size:11px;color:#888780;margin-top:3px;">苗字は漢字、名前は頭文字のローマ字で入力します（例：山田太郎→山田.T）。</div>
    </div>
  </div>

  <div class="row2">
    <div class="form-group">
      <label class="form-label">問い合わせ日 <span class="req">*</span></label>
      <input class="form-control" id="f-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">問い合わせ経路</label>
      <select class="form-control" id="f-route">
        <option value="">選択</option>
        <option>電話</option><option>FAX</option><option>病院連携室</option>
        <option>ケアマネ</option><option>来所</option><option>その他</option>
      </select>
    </div>
  </div>

  <div class="row2">
    <div class="form-group">
      <label class="form-label">担当者</label>
      <select class="form-control" id="f-staff">
        <option value="">選択</option>
        <option>瀧川</option><option>谷口</option><option>春名</option>
        <option>佐藤</option><option>溝川</option>
        <option>亀橋</option><option>山元</option><option>中島</option>
        <option>未割当</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">24時間以内の連絡</label>
      <select class="form-control" id="f-responded">
        <option value="未対応">未対応</option>
        <option value="対応済">対応済</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">申込みの種類</label>
    <select class="form-control" id="f-admtype">
      <option value="">未選択</option>
      <option value="新規入所">新規入所</option>
      <option value="再入所">再入所</option>
    </select>
    <div style="font-size:11px;color:#888780;margin-top:3px;">初めての入所か、過去に入所歴のある再入所かを選びます。</div>
  </div>

  <div class="section-label">進捗の日付（入力するとステップが自動で進みます）</div>
  <div class="date-grid">
    <div class="form-group">
      <label class="form-label">申込日</label>
      <input class="form-control" id="f-applyDate" type="date" onchange="updateStepPreview()">
    </div>
    <div class="form-group">
      <label class="form-label">面接日</label>
      <input class="form-control" id="f-mensetsuDate" type="date" onchange="updateStepPreview()">
    </div>
    <div class="form-group">
      <label class="form-label">検討会議日</label>
      <input class="form-control" id="f-kaigiDate" type="date" onchange="updateStepPreview()">
    </div>
    <div class="form-group">
      <label class="form-label">入所日</label>
      <input class="form-control" id="f-nyushoDate" type="date" onchange="updateStepPreview()">
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">現在のステップ（自動判定）</label>
    <div><span class="step-preview b-danger" id="step-preview">受付済</span></div>
  </div>

  <div class="form-group">
    <label class="form-label">紹介元事業所</label>
    <input class="form-control" id="f-referrer" list="referrer-list" placeholder="営業先から選択、または自由入力">
    <datalist id="referrer-list"></datalist>
    <div style="font-size:11px;color:#888780;margin-top:3px;">営業日報に登録された事業所が候補に出ます。新しい事業所は直接入力できます。</div>
  </div>

  <div class="form-group">
    <label class="form-label">備考</label>
    <input class="form-control" id="f-note" placeholder="例：病院連携室の田中氏より紹介">
  </div>

  <div class="form-group" id="progress-section" style="border-top:0.5px solid rgba(0,0,0,0.12);padding-top:14px;margin-top:4px;">
    <label class="form-label" style="font-weight:600;color:#0C447C;">経過記録</label>
    <div style="font-size:11px;color:#888780;margin-bottom:8px;">利用者本人や家族の氏名など、個人が特定できる固有名詞は書かないでください。</div>
    <div id="progress-list" style="margin-bottom:10px;"></div>
    <div style="background:#f5f5f3;border-radius:8px;padding:10px;">
      <div class="row2" style="margin-bottom:8px;">
        <div>
          <label class="form-label" style="font-size:11px;">記録日</label>
          <input class="form-control" id="pr-date" type="date">
        </div>
        <div>
          <label class="form-label" style="font-size:11px;">記録者</label>
          <select class="form-control" id="pr-writer">
            <option value="">選択</option>
            <option>瀧川</option><option>谷口</option><option>春名</option>
            <option>佐藤</option><option>溝川</option>
            <option>亀橋</option><option>山元</option><option>中島</option>
          </select>
        </div>
      </div>
      <label class="form-label" style="font-size:11px;">記録内容</label>
      <textarea class="form-control" id="pr-body" rows="3" placeholder="例：家族と面談。在宅復帰の意向を確認。退所後のサービス調整が必要。" style="resize:vertical;"></textarea>
      <button class="btn btn-secondary" onclick="addProgress()" style="margin-top:8px;"><i class="ti ti-plus"></i>記録を追加</button>
    </div>
  </div>

  <input type="hidden" id="f-edit-id">
  <div class="footer-btns">
    <button class="btn btn-danger" id="del-btn" onclick="deleteCurrent()" style="display:none;"><i class="ti ti-trash"></i>このケースを削除</button>
    <div style="display:flex;gap:8px;margin-left:auto;">
      <button class="btn btn-secondary" onclick="resetForm()"><i class="ti ti-plus"></i>新規入力に戻す</button>
      <button class="btn btn-primary" onclick="saveCase()"><i class="ti ti-device-floppy"></i>保存する</button>
    </div>
  </div>
</div>

<!-- 既存ケース一覧（編集用） -->
<div class="list-card">
  <div class="list-head">
    <span>登録済みケース（タップで編集）</span>
    <button class="btn btn-secondary" onclick="loadCases()" style="padding:5px 10px;font-size:12px;"><i class="ti ti-refresh"></i>更新</button>
  </div>
  <div style="padding:10px 16px 0;">
    <input class="form-control search-box" id="search" placeholder="受付番号・氏名で絞り込み" oninput="renderList()">
  </div>
  <div id="case-list" style="max-height:340px;overflow-y:auto;">
    <div style="padding:20px;text-align:center;color:#888780;font-size:13px;">読み込み中...</div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// 入所管理ダッシュボードと同じスプレッドシートに接続
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw7nSOOmjhLJbEFwCeZySYBl90Kd4Jbj3AilkYOe7Cwf_BhK1Qjeby-oGxtOFhbm8lk/exec';
// 営業日報のスプレッドシート（紹介元事業所の候補に使う）
const EIGYO_GAS_URL = 'https://script.google.com/macros/s/AKfycbycjhWyoxblFzICDubJkVzOQNSRT2rVN3_5aoxPipUR0YTHpJsTppW7Pt54-OuhaTfGhQ/exec';

const now=new Date();
const todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
const FISCAL_START_YEAR=(now.getMonth()+1)>=4?now.getFullYear():now.getFullYear()-1;
let cases=[];
let editingId=null;
let currentProgress=[]; // 編集中ケースの経過記録

document.getElementById('f-date').value=todayStr;

function setStatus(msg,ok){
  document.getElementById('status-text').textContent=msg;
  const el=document.getElementById('status');
  el.style.color = ok===true?'#3B6D11':ok===false?'#BA7517':'#888780';
}

// ===== サーバー読み込み =====
async function loadCases(){
  setStatus('読み込み中...',null);
  try{
    const res=await fetch(GAS_URL+'?action=list',{method:'GET'});
    const data=await res.json();
    cases=Array.isArray(data.cases)?data.cases:[];
    setStatus('同期済',true);
    renderList();
  }catch(e){
    setStatus('接続できません',false);
    document.getElementById('case-list').innerHTML='<div style="padding:20px;text-align:center;color:#E24B4A;font-size:13px;">接続できませんでした。再読み込みしてください。</div>';
  }
}

async function pushAll(){
  setStatus('保存中...',null);
  try{
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',cases})});
    setStatus('同期済',true);
    return true;
  }catch(e){
    setStatus('保存失敗',false);
    return false;
  }
}

// ===== ステップ自動判定 =====
function autoStep(c){
  if(c.nyushoDate) return '入所済';
  if(c.kaigiDate)  return '判定済';
  if(c.mensetsuDate) return '面接済';
  if(c.applyDate)  return '申込済';
  if(c.date)       return '受付済';
  return '未受付';
}
function stepClass(s){
  return {'未受付':'b-gray','受付済':'b-danger','申込済':'b-warn','面接済':'b-info','判定済':'b-info','入所済':'b-success'}[s]||'b-gray';
}
function updateStepPreview(){
  const c={
    date:document.getElementById('f-date').value,
    applyDate:document.getElementById('f-applyDate').value,
    mensetsuDate:document.getElementById('f-mensetsuDate').value,
    kaigiDate:document.getElementById('f-kaigiDate').value,
    nyushoDate:document.getElementById('f-nyushoDate').value
  };
  const s=autoStep(c);
  const el=document.getElementById('step-preview');
  el.textContent=s;
  el.className='step-preview '+stepClass(s);
}

// ===== 受付番号 自動採番 =====
function generateRecNo(){
  const prefix=FISCAL_START_YEAR+'-';
  let max=0;
  cases.forEach(c=>{
    if(c.recno && String(c.recno).startsWith(prefix)){
      const n=parseInt(String(c.recno).slice(prefix.length));
      if(!isNaN(n)&&n>max)max=n;
    }
  });
  return prefix+String(max+1).padStart(3,'0');
}

// ===== 保存 =====
async function saveCase(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('氏名（苗字＋名前の頭文字）を入力してください');return;}
  const date=document.getElementById('f-date').value;
  if(!date){alert('問い合わせ日を入力してください');return;}

  let recno;
  if(editingId){
    const ex=cases.find(x=>x.id===editingId);
    recno=ex&&ex.recno?ex.recno:generateRecNo();
  } else {
    recno=generateRecNo();
  }
  const obj={
    id: editingId||Date.now(),
    recno,
    name, date,
    route:document.getElementById('f-route').value||'—',
    staff:document.getElementById('f-staff').value||'未割当',
    responded:document.getElementById('f-responded').value,
    admtype:document.getElementById('f-admtype').value||'',
    applyDate:document.getElementById('f-applyDate').value||'',
    mensetsuDate:document.getElementById('f-mensetsuDate').value||'',
    kaigiDate:document.getElementById('f-kaigiDate').value||'',
    nyushoDate:document.getElementById('f-nyushoDate').value||'',
    referrer:document.getElementById('f-referrer').value||'',
    note:document.getElementById('f-note').value||'',
    progress: JSON.stringify(currentProgress||[])
  };
  obj.step=autoStep(obj);
  // 旧フィールド互換
  obj.applied = obj.applyDate ? '申込済' : '未申込';

  if(editingId){
    const idx=cases.findIndex(x=>x.id===editingId);
    if(idx>-1)cases[idx]=obj;
  } else {
    cases.unshift(obj);
  }
  const ok=await pushAll();
  if(ok){
    toast(editingId?'更新しました':('登録しました（'+recno+'）'));
    resetForm();
    renderList();
  } else {
    toast('保存に失敗しました');
  }
}

// ===== 削除 =====
async function deleteCurrent(){
  if(!editingId)return;
  if(!confirm('このケースを削除しますか？元に戻せません。'))return;
  cases=cases.filter(c=>c.id!==editingId);
  const ok=await pushAll();
  if(ok){ toast('削除しました'); resetForm(); renderList(); }
}

// ===== フォーム操作 =====
function resetForm(){
  editingId=null;
  document.getElementById('form-title').textContent='新規ケース登録';
  document.getElementById('f-recno').value='';
  document.getElementById('f-recno').placeholder='登録時に自動採番';
  document.getElementById('f-name').value='';
  document.getElementById('f-date').value=todayStr;
  document.getElementById('f-route').value='';
  document.getElementById('f-staff').value='';
  document.getElementById('f-responded').value='未対応';
  document.getElementById('f-admtype').value='';
  ['applyDate','mensetsuDate','kaigiDate','nyushoDate'].forEach(k=>document.getElementById('f-'+k).value='');
  document.getElementById('f-referrer').value='';
  document.getElementById('f-note').value='';
  document.getElementById('del-btn').style.display='none';
  currentProgress=[];
  renderProgress();
  document.getElementById('pr-date').value=todayStr;
  document.getElementById('pr-writer').value='';
  document.getElementById('pr-body').value='';
  updateStepPreview();
}

function editCase(id){
  const c=cases.find(x=>x.id===id);
  if(!c)return;
  editingId=id;
  document.getElementById('form-title').textContent='ケース編集';
  document.getElementById('f-recno').value=c.recno||'';
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-date').value=c.date||'';
  document.getElementById('f-route').value=(c.route&&c.route!=='—')?c.route:'';
  document.getElementById('f-staff').value=c.staff||'';
  document.getElementById('f-responded').value=c.responded||'未対応';
  document.getElementById('f-admtype').value=c.admtype||'';
  document.getElementById('f-applyDate').value=c.applyDate||'';
  document.getElementById('f-mensetsuDate').value=c.mensetsuDate||'';
  document.getElementById('f-kaigiDate').value=c.kaigiDate||'';
  document.getElementById('f-nyushoDate').value=c.nyushoDate||'';
  document.getElementById('f-referrer').value=c.referrer||'';
  document.getElementById('f-note').value=c.note||'';
  document.getElementById('del-btn').style.display='inline-flex';
  // 経過記録を復元
  try{ currentProgress = c.progress ? JSON.parse(c.progress) : []; }catch(e){ currentProgress=[]; }
  if(!Array.isArray(currentProgress)) currentProgress=[];
  renderProgress();
  document.getElementById('pr-date').value=todayStr;
  document.getElementById('pr-writer').value='';
  document.getElementById('pr-body').value='';
  updateStepPreview();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== 経過記録 =====
function renderProgress(){
  const box=document.getElementById('progress-list');
  if(currentProgress.length===0){
    box.innerHTML='<div style="font-size:12px;color:#B4B2A9;padding:6px 0;">まだ記録はありません。</div>';
    return;
  }
  // 記録日の新しい順に表示
  const sorted=[...currentProgress].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  box.innerHTML=sorted.map(p=>{
    const idx=currentProgress.indexOf(p);
    return '<div style="border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:8px 10px;margin-bottom:6px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'
      +'<span style="font-size:12px;font-weight:600;color:#185FA5;">'+fmtD(p.date)+'　'+esc(p.writer||'')+'</span>'
      +'<span onclick="removeProgress('+idx+')" style="cursor:pointer;color:#c00;font-size:12px;" title="削除">×</span>'
      +'</div>'
      +'<div style="font-size:13px;white-space:pre-wrap;word-break:break-word;">'+esc(p.body||'')+'</div>'
      +'</div>';
  }).join('');
}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function addProgress(){
  const date=document.getElementById('pr-date').value;
  const writer=document.getElementById('pr-writer').value;
  const body=document.getElementById('pr-body').value.trim();
  if(!date){ alert('記録日を入力してください'); return; }
  if(!writer){ alert('記録者を選んでください'); return; }
  if(!body){ alert('記録内容を入力してください'); return; }
  currentProgress.push({date, writer, body, ts:Date.now()});
  renderProgress();
  // 入力欄をクリア（記録日は当日に戻す）
  document.getElementById('pr-date').value=todayStr;
  document.getElementById('pr-writer').value='';
  document.getElementById('pr-body').value='';
  toast('記録を追加しました。ケースを保存すると確定します。');
}
function removeProgress(idx){
  if(!confirm('この記録を削除しますか？'))return;
  currentProgress.splice(idx,1);
  renderProgress();
}
window.addProgress=addProgress; window.removeProgress=removeProgress;

// ===== 一覧描画 =====
function fmtD(s){ if(!s)return''; const p=String(s).split('-'); return p.length===3?(p[1]+'/'+p[2]):s; }
function renderList(){
  const q=document.getElementById('search').value.trim();
  const list=document.getElementById('case-list');
  let arr=[...cases].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(q){
    arr=arr.filter(c=>(String(c.recno||'').includes(q))||(String(c.name||'').includes(q)));
  }
  if(arr.length===0){
    list.innerHTML='<div style="padding:20px;text-align:center;color:#888780;font-size:13px;">'+(cases.length===0?'登録されたケースはありません':'該当するケースがありません')+'</div>';
    return;
  }
  list.innerHTML=arr.map(c=>{
    const s=autoStep(c);
    const dates=[];
    if(c.date)dates.push('問'+fmtD(c.date));
    if(c.applyDate)dates.push('申'+fmtD(c.applyDate));
    if(c.mensetsuDate)dates.push('面'+fmtD(c.mensetsuDate));
    if(c.kaigiDate)dates.push('会'+fmtD(c.kaigiDate));
    if(c.nyushoDate)dates.push('入'+fmtD(c.nyushoDate));
    return `<div class="list-item" onclick="editCase(${c.id})">
      <div>
        <div class="li-main"><span class="li-recno">${c.recno||'—'}</span>　${c.name||''}　<span style="color:#888780;">${c.staff||''}</span></div>
        <div class="li-sub">${dates.join('　')}</div>
      </div>
      <span class="step-preview ${stepClass(s)}">${s}</span>
    </div>`;
  }).join('');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2300);
}

// 営業日報から事業所名の候補を読み込み、紹介元のdatalistに入れる
async function loadReferrerCandidates(){
  if(EIGYO_GAS_URL.indexOf('script.google.com')<0) return;
  try{
    const res=await fetch(EIGYO_GAS_URL+'?action=list',{method:'GET'});
    const data=await res.json();
    const visits=Array.isArray(data.visits)?data.visits:[];
    // 事業所名の重複を除いて候補化
    const names=[...new Set(visits.map(v=>v.jigyo).filter(n=>n&&n.trim()))].sort();
    const dl=document.getElementById('referrer-list');
    dl.innerHTML=names.map(n=>'<option value="'+n.replace(/"/g,'&quot;')+'">').join('');
  }catch(e){ /* 候補が取れなくても自由入力は可能 */ }
}

// 初期化
document.getElementById('pr-date').value=todayStr;
renderProgress();
updateStepPreview();
loadCases();
loadReferrerCandidates();
</script>
